AWSTemplateFormatVersion: '2010-09-09'
Description: Provider vector search sync Lambda for Sin Envolturas

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  OpenAiSecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the OpenAI API key
  SinEnvolturasBaseUrl:
    Type: String
    Default: https://api.sinenvolturas.com/api-web/vendor
  ProviderVectorStoreName:
    Type: String
    Default: Sin Envolturas Provider Search
  ProviderVectorStoreId:
    Type: String
    Default: ''
    Description: Existing provider vector store ID (leave empty to create new)
  CodeS3Bucket:
    Type: String
    Description: S3 bucket containing the zipped Lambda artifact.
  CodeS3Key:
    Type: String
    Default: provider-sync/dev/latest.zip
    Description: S3 key containing the zipped provider sync Lambda artifact.

Conditions:
  HasVectorStoreId: !Not [!Equals [!Ref ProviderVectorStoreId, '']]

Resources:
  ProviderSyncFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: recap-agent-provider-sync-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAiSecretArn

  ProviderSyncFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub recap-agent-provider-sync-${Environment}
      Runtime: nodejs24.x
      Handler: provider-sync/index.handler
      Role: !GetAtt ProviderSyncFunctionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          OPENAI_SECRET_ID: !Ref OpenAiSecretArn
          SINENVOLTURAS_BASE_URL: !Ref SinEnvolturasBaseUrl
          PROVIDER_VECTOR_STORE_NAME: !Ref ProviderVectorStoreName
          PROVIDER_VECTOR_STORE_ID: !If [HasVectorStoreId, !Ref ProviderVectorStoreId, !Ref AWS::NoValue]
          NODE_OPTIONS: --enable-source-maps
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key

  ProviderSyncSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub recap-agent-provider-sync-schedule-${Environment}
      Description: Trigger provider vector search sync weekly
      ScheduleExpression: rate(7 days)
      State: ENABLED
      Targets:
        - Id: ProviderSyncLambda
          Arn: !GetAtt ProviderSyncFunction.Arn

  ProviderSyncSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProviderSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ProviderSyncSchedule.Arn

Outputs:
  ProviderSyncFunctionArn:
    Description: ARN of the provider sync Lambda function
    Value: !GetAtt ProviderSyncFunction.Arn
  ProviderSyncFunctionName:
    Description: Name of the provider sync Lambda function
    Value: !Ref ProviderSyncFunction
  ProviderVectorStoreId:
    Description: Provider vector store ID
    Value: !If [HasVectorStoreId, !Ref ProviderVectorStoreId, 'created-on-first-run']
