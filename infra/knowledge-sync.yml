AWSTemplateFormatVersion: '2010-09-09'
Description: Knowledge base sync Lambda for Sin Envolturas help center (S3-triggered + scheduled)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  OpenAiSecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the OpenAI API key
  KbBaseUrl:
    Type: String
    Default: https://sinenvolturas.tawk.help
  KbVectorStoreName:
    Type: String
    Default: Sin Envolturas Knowledge Base
  KbVectorStoreId:
    Type: String
    Default: ''
    Description: Existing vector store ID (leave empty to create new)

Conditions:
  HasVectorStoreId: !Not [!Equals [!Ref KbVectorStoreId, '']]

Resources:
  KnowledgeSyncFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: recap-agent-knowledge-sync-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAiSecretArn
        - PolicyName: recap-agent-knowledge-sync-s3
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::recap-agent-artifacts-${AWS::AccountId}-${AWS::Region}/knowledge-sync/${Environment}/*

  KnowledgeSyncFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub recap-agent-knowledge-sync-${Environment}
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt KnowledgeSyncFunctionRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          OPENAI_SECRET_ID: !Ref OpenAiSecretArn
          KB_BASE_URL: !Ref KbBaseUrl
          KB_VECTOR_STORE_NAME: !Ref KbVectorStoreName
          KB_VECTOR_STORE_ID: !If [HasVectorStoreId, !Ref KbVectorStoreId, !Ref AWS::NoValue]
          ARTIFACT_BUCKET: !Sub recap-agent-artifacts-${AWS::AccountId}-${AWS::Region}
          AWS_ACCOUNT_ID: !Ref AWS::AccountId
          NODE_OPTIONS: --enable-source-maps
      Code:
        S3Bucket: !Sub recap-agent-artifacts-${AWS::AccountId}-${AWS::Region}
        S3Key: !Sub knowledge-sync/${Environment}/latest.zip

  KnowledgeSyncSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub recap-agent-knowledge-sync-schedule-${Environment}
      Description: Trigger knowledge base sync weekly from S3
      ScheduleExpression: rate(7 days)
      State: ENABLED
      Targets:
        - Id: KnowledgeSyncLambda
          Arn: !GetAtt KnowledgeSyncFunction.Arn

  KnowledgeSyncSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref KnowledgeSyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt KnowledgeSyncSchedule.Arn

  # S3 notification to trigger Lambda when articles are uploaded
  KnowledgeSyncS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref KnowledgeSyncFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::recap-agent-artifacts-${AWS::AccountId}-${AWS::Region}
      SourceAccount: !Ref AWS::AccountId

Outputs:
  KnowledgeSyncFunctionArn:
    Description: ARN of the knowledge sync Lambda function
    Value: !GetAtt KnowledgeSyncFunction.Arn
  KnowledgeSyncFunctionName:
    Description: Name of the knowledge sync Lambda function
    Value: !Ref KnowledgeSyncFunction
  VectorStoreId:
    Description: Vector store ID (if created by the sync job, this will be empty until first run)
    Value: !If [HasVectorStoreId, !Ref KbVectorStoreId, 'created-on-first-run']
