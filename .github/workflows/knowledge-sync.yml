name: Knowledge Base Sync

on:
  schedule:
    # Every Sunday at 06:00 UTC (runs weekly)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if content has not changed'
        required: false
        default: 'false'

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape knowledge base
        env:
          KB_SKIP_UPLOAD: 'true'
        run: |
          npx tsx scripts/sync-knowledge-base.ts

      - name: Upload articles to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          cd dist/knowledge-base
          zip -r ../../knowledge-base-articles.zip .
          cd ../..
          aws s3 cp knowledge-base-articles.zip \
            s3://recap-agent-artifacts-684516060775-us-east-1/knowledge-sync/dev/articles-latest.zip

      - name: Trigger knowledge-sync Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          echo '{"source":"github-actions","force":${{ github.event.inputs.force || 'false' }}}' | base64 > /tmp/payload.b64
          aws lambda invoke \
            --function-name recap-agent-knowledge-sync-dev \
            --payload file:///tmp/payload.b64 \
            response.json
          cat response.json | jq .
