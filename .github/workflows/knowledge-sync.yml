name: Knowledge Base Sync

on:
  schedule:
    # Every Sunday at 06:00 UTC (runs weekly)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if content has not changed'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape knowledge base
        env:
          KB_SKIP_UPLOAD: 'true'
        run: |
          npx tsx scripts/sync-knowledge-base.ts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684516060775:role/recap-agent-github-actions
          aws-region: us-east-1

      - name: Upload articles to S3
        run: |
          cd dist/knowledge-base
          zip -r ../../knowledge-base-articles.zip .
          cd ../..
          aws s3 cp knowledge-base-articles.zip \
            s3://recap-agent-artifacts-684516060775-us-east-1/knowledge-sync/dev/articles-latest.zip

      - name: Trigger knowledge-sync Lambda
        run: |
          aws lambda invoke \
            --function-name recap-agent-knowledge-sync-dev \
            --payload '{"source":"github-actions","force":${{ github.event.inputs.force || false }}}' \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json | jq .
