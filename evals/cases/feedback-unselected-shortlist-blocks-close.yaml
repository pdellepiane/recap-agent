suite: feedback_regression
version: 1
description: Close flow should ask for explicit select/defer when a real shortlist remains unselected.
tags: [feedback, batch2, close]
inputs:
  - text: quiero cerrar
seedPlan:
  current_node: recomendar
  event_type: boda
  location: Lima
  guest_range: 51-100
  active_need_category: Catering
  vendor_category: Catering
  provider_needs:
    - category: Catering
      status: shortlisted
      preferences: []
      hard_constraints: []
      missing_fields: []
      recommended_provider_ids: [109]
      recommended_providers:
        - id: 109
          title: EDO Sushi Bar
          category: Catering
          location: Lima
          priceLevel: high
          reason: opción previa
          serviceHighlights: []
          termsHighlights: []
      selected_provider_ids: []
      selected_provider_hints: []
fixtures:
  offline:
    extractionsByTurn:
      - intent: cerrar
        intentConfidence: 0.95
        eventType: boda
        vendorCategory: Catering
        vendorCategories: [Catering]
        activeNeedCategory: Catering
        location: Lima
        budgetSignal: null
        guestRange: 51-100
        preferences: []
        hardConstraints: []
        assumptions: []
        conversationSummary: El usuario quiere cerrar pero Catering tiene opciones sin seleccionar.
        selectedProviderHints: []
        pauseRequested: false
    repliesByTurn:
      - Antes de cerrar, necesito saber si eliges EDO Sushi Bar para Catering o si prefieres dejar Catering sin proveedor respondiendo ninguna.
expectations:
  - id: close-node
    type: node_transition
    to: crear_lead_cerrar
  - id: asks-explicit-opt-out
    type: text_contains
    allOf: [Catering]
    anyOf: [ninguna, dejar Catering sin proveedor]

