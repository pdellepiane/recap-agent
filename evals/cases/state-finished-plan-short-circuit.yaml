expectations:
  - id: stay-closed-node
    type: node_transition
    from: necesidad_cubierta
    to: necesidad_cubierta
  - id: lifecycle-finished
    type: plan_field_equals
    path: lifecycle_state
    expected: finished
  - id: contact-email-kept
    type: plan_field_equals
    path: contact_email
    expected: ada@example.com
  - id: provider-context-preserved
    type: provider_results_contains
    providers:
      - id: 109
    matchMode: all
  - id: no-tools-on-short-circuit
    type: tool_usage
    mustCall: []
    mustNotCall:
      - search_providers_from_plan
      - finish_plan
    maxTotalCalls: 1
  - id: cooldown-message
    type: text_contains
    allOf:
      - 24 horas
scorers:
  - id: expectation-core
    type: expectation_pass_rate
    weight: 1
  - id: budget-efficiency
    type: budget_efficiency
    weight: 0.25
    targetLatencyMs: 400
    targetToolCalls: 0
