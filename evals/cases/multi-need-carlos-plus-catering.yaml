template: template.base-offline
id: multi_need.select_photography_and_open_catering
suite: multi_need_planning
version: 1
description: Confirm one provider on photography while opening catering in the same turn.
imports:
  - ../fixtures/seed-plans/recommend-photography-shortlist-carlos.yaml
  - ../fixtures/offline/search-results/catering-shortlist-top-three.yaml
tags:
  - mixed-turn
  - multi-need
  - regression
inputs:
  - text: quiero utilizar los servicios de Carlos, tambien necesito catering
fixtures:
  offline:
    extractionsByTurn:
      - intent: confirmar_proveedor
        intentConfidence: 0.95
        eventType: boda
        vendorCategory: catering
        vendorCategories:
          - fotografía
          - catering
        activeNeedCategory: catering
        location: Lima
        budgetSignal: null
        guestRange: 51-100
        preferences: []
        hardConstraints: []
        assumptions: []
        conversationSummary: El usuario quiere a Carlos para fotografía y ahora necesita catering.
        selectedProviderHint: Carlos
        pauseRequested: false
    repliesByTurn:
      - Perfecto. Tomo a Carlos para fotografía y ahora te muestro catering en Lima.
expectations:
  - id: final-node
    type: node_transition
    to: recomendar
  - id: active-need-catering
    type: plan_field_equals
    path: active_need_category
    expected: catering
  - id: preserve-selection
    type: plan_field_subset
    path: provider_needs
    expected:
      - category: fotografía
        status: selected
        selected_provider_id: 90
      - category: catering
        status: shortlisted
  - id: mixed-turn-invariant
    type: trajectory_invariants
    preservePriorSelection: true
