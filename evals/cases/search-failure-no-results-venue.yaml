template: template.base-offline
id: search_failure.no_results_venue
suite: search_failure_modes
version: 1
description: Zero-result venue searches should move to refinement without reopening settled terminology.
tags:
  - no-results
  - local
  - refinement
inputs:
  - text: quiero que me digas el local
seedPlan:
  current_node: refinar_criterios
  event_type: baby shower
  location: La Molina
  budget_signal: medio
  guest_range: 21-50
  active_need_category: local
  vendor_category: local
  provider_needs:
    - category: local
      status: search_ready
      preferences: []
      hard_constraints: []
      missing_fields: []
      recommended_provider_ids: []
      recommended_providers: []
      selected_provider_id: null
      selected_provider_hint: null
fixtures:
  offline:
    extractionsByTurn:
      - intent: ver_opciones
        intentConfidence: 0.9
        eventType: baby shower
        vendorCategory: local
        vendorCategories:
          - local
        activeNeedCategory: local
        location: La Molina
        budgetSignal: medio
        guestRange: 21-50
        preferences: []
        hardConstraints: []
        assumptions: []
        conversationSummary: Quiere que se le muestren opciones de local en La Molina.
        selectedProviderHint: null
        pauseRequested: false
    repliesByTurn:
      - No encontré opciones claras con esos criterios. Puedo afinar por presupuesto o nivel de servicio del local.
    providerGateway:
      searchProvidersByTurn:
        - value:
            providers: []
expectations:
  - id: refine-node
    type: node_transition
    to: refinar_criterios
  - id: searched-once
    type: tool_usage
    mustCall:
      - search_providers_from_plan
  - id: no-category-reask
    type: text_not_contains
    phrases:
      - salón/local para eventos
      - te refieres a un salón
